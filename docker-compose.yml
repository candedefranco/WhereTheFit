name: where-the-fit

services:
  postgres:
    image: postgres:16
    container_name: wtf-postgres
    environment:
      POSTGRES_USER: $(db_username)
      POSTGRES_PASSWORD: $(db_password)
      POSTGRES_DB: wtf_db
    ports:
      - "5432:5432"
    volumes:
      - wtf-pg-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  wtf-pg-data:
    name: wtf-pg-data